<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calanus Biomass Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: url('figures/NE%20shelf.png') center center / cover no-repeat fixed;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo {
    width: 440px;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 0.4rem;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  p {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 2rem;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    display: block;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 1.5rem 2rem;
    text-decoration: none;
    color: #333;
    width: 260px;
    text-align: center;
    transition: box-shadow 0.15s, transform 0.15s;
    backdrop-filter: blur(4px);
  }
  .card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    transform: translateY(-3px);
  }
  .card h2 { font-size: 1.2rem; margin-bottom: 0.4rem; }
  .card span { font-size: 0.85rem; color: #666; }
</style>
</head>
<body>
  <div class="content">
    <img class="logo" src="figures/calanus_trans.png" alt="Calanus">
    <h1>Calanus Biomass Viewer</h1>
    <p>Select a region to explore biomass climatology figures.</p>
    <div class="cards">
      <a class="card" href="cinar.html">
        <h2>CINAR Polygons</h2>
        <span>8 regions in the Gulf of Maine and Scotian Shelf</span>
      </a>
      <a class="card" href="ecomon.html">
        <h2>EcoMon Strata</h2>
        <span>33 NOAA EcoMon survey strata</span>
      </a>
      <a class="card" href="cpo.html">
        <h2>CPO Project</h2>
        <span>Stellwagen Bank NMS and surrounding strata</span>
      </a>
    </div>
  </div>
</body>
</html>
